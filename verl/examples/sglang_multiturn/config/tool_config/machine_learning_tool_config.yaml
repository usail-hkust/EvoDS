tools:
  - class_name: "verl.tools.machine_learning_tools.LogisticRegressionTool"
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "logistic_regression"
        description: "Execute a logistic regression model with cross-validation, generate predictions on the test set, and save the submission file."
        parameters:
          type: "object"
          required: ["train_dataset_path", "test_dataset_path", "X_columns", "Y_column", "submission_columns", "submission_file_path"]
          properties:
            train_dataset_path:
              type: "string"
              description: "Path to the training dataset file."
            test_dataset_path:
              type: "string"
              description: "Path to the testing dataset file."
            X_columns:
              type: "list"
              description: "List of numerical feature column names for training."
              items:
                type: "string"
            Y_column:
              type: "string"
              description: "The target label column."
            submission_columns:
              type: "list"
              description: "Columns from the test dataset to include in the submission file."
              items:
                type: "string"
            submission_file_path:
              type: "string"
              description: "File path to save the submission file."
  
